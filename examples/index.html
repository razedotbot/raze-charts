<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raze Charts — example</title>
  <style>
    html, body { margin: 0; height: 100%; background: #181615; font-family: 'JetBrains Mono', ui-monospace, monospace; }
    #wrap { position: absolute; inset: 24px; border: 1px solid #3d3935; border-radius: 6px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="wrap"></div>
  <script type="module">
    import { widget } from "../dist/charting_library.esm.js";
    import { makeMockDatafeed } from "./mock-datafeed.mjs";

    const datafeed = makeMockDatafeed({ bars: 2000, startPrice: 6400 });
    const w = new widget({
      symbol: "MOCK",
      datafeed,
      interval: "1",
      container: document.getElementById("wrap"),
      library_path: "/",
      locale: "en",
      theme: "dark",
      autosize: true,
      timezone: "exchange",
      custom_font_family: "'JetBrains Mono', ui-monospace, monospace",
      loading_screen: { backgroundColor: "#181615", foregroundColor: "#d8aa5b" },
      enabled_features: ["seconds_resolution", "mark_on_bars"],
      disabled_features: ["header_symbol_search", "popup_hints"],
      overrides: {
        "paneProperties.background": "#181615",
        "paneProperties.vertGridProperties.color": "rgba(244,238,225,0.04)",
        "paneProperties.horzGridProperties.color": "rgba(244,238,225,0.04)",
        "paneProperties.crossHairProperties.color": "rgba(244,238,225,0.3)",
        "scalesProperties.textColor": "#8b887e",
        "scalesProperties.backgroundColor": "#181615",
        "scalesProperties.lineColor": "#3d3935",
        "mainSeriesProperties.candleStyle.upColor": "#66d89e",
        "mainSeriesProperties.candleStyle.downColor": "#e57359",
        "mainSeriesProperties.candleStyle.borderUpColor": "#66d89e",
        "mainSeriesProperties.candleStyle.borderDownColor": "#e57359",
        "mainSeriesProperties.candleStyle.wickUpColor": "#66d89e",
        "mainSeriesProperties.candleStyle.wickDownColor": "#e57359",
      },
    });

    w.headerReady().then(() => {
      const b = w.createButton({ align: "left", useTradingViewStyle: false });
      b.style.cssText = "cursor:pointer;padding:0 8px;color:#f4eee1;";
      b.innerHTML = '<span style="color:#66d89e">MarketCap</span><span style="color:#444">/</span><span style="color:#555">Price</span>';
    });

    w.onChartReady(() => {
      const chart = w.activeChart();
      // A horizontal "limit line" the way the app draws them.
      chart.createShape({ time: Math.floor(Date.now() / 1000), price: 11200 }, {
        shape: "horizontal_line", lock: false, text: "Limit Buy ↕",
        overrides: { linecolor: "#66d89e", linestyle: 1, linewidth: 1, textcolor: "#66d89e", showPrice: true },
      });
      window.__razeChart = w;
    });
  </script>
</body>
</html>
